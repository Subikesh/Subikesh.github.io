<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subikesh | Portfolio</title>

    <!-- SEO + social previews — pageTitle/description/social copy is also driven from data.json -->
    <meta name="description" content="Personal portfolio of Subikesh P S — Android developer at Zoho Corporation.">
    <meta name="theme-color" content="#38a7f1">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Subikesh | Portfolio">
    <meta property="og:description" content="Personal portfolio of Subikesh P S — Android developer at Zoho Corporation.">
    <meta property="og:url" content="https://subikesh.com/">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Subikesh | Portfolio">
    <meta name="twitter:description" content="Personal portfolio of Subikesh P S — Android developer at Zoho Corporation.">

    <!-- Favicon files -->
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">

    <!-- CSS files -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Preconnects -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://kit.fontawesome.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;1,100&display=swap" rel="stylesheet">

    <!-- Font awesome kit -->
    <script src="https://kit.fontawesome.com/37391a116f.js" crossorigin="anonymous"></script>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js" integrity="sha384-q2kxQ16AaE6UbzuKqyBE9/u/KzioAlnx2maXQHiDX9d4/zp8Ok3f+M7DPm+Ib6IU" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.min.js" integrity="sha384-pQQkAEnwaBkjpqZ8RU1fF1AKtTcHJwFl3pblpTlHXybJjHpMYo79HY3hIi4NKxyj" crossorigin="anonymous"></script>
</head>
<body class="js-loader">
    <!-- Loader -->
    <div class="preloader"></div>

    <!-- Main Body — name/designation/social rendered from data.meta -->
    <div class="container">
        <div class="name-header">
            <div class="display-4">
                <span class="fadefirst">Hi</span><span class="fadesecond">, I am</span>
            </div>
            <h1 class="display-1 fadesecond">Subikesh <span class="non-overflow">P S</span></h1>
        </div>
        <div class="designation fadethird">Software developer</div>
        <div class="ruler"></div>
        <div class="social">
            Connect with me:
            <span class="non-overflow"></span>
        </div>
    </div> <!-- End main body -->

    <!-- Navigation Cards -->
    <div class="nav-cards">
        <div id="info-card" role="button" tabindex="0" title="Icons info">
            <a class="fadesecond icons fa fa-info-circle" aria-hidden="true"></a>
        </div>

        <!-- About card -->
        <div id="about-card" class="center-card" role="button" tabindex="0" aria-label="About">
            <i class="icons fa fa-address-card"></i>
            <h3 class="tag-title">About</h3>
            <div class="container">
                <div class="row">
                    <div class="col-md-6 col-sm-12">
                        <h3 class="section-title">About</h3>
                    </div>
                    <div class="col-md-6 col-sm-12">
                        <div class="card-content" data-render="about"></div>
                    </div>
                </div>
            </div>
        </div> <!-- End About card -->

        <!-- Projects card -->
        <div id="project-card" class="center-card" role="button" tabindex="0" aria-label="Projects">
            <i class="icons fa fa-code"></i>
            <h3 class="tag-title">Projects</h3>
            <div class="card-content container">
                <h3 class="section-title">Projects</h3>
                <div class="row card-group" data-render="projects"></div>
            </div>
        </div> <!-- End project card -->

        <!-- Resume card -->
        <div id="resume-card" class="center-card overflow-hidden" role="button" tabindex="0" aria-label="Resume">
            <i class="icons fa fa-poll-h"></i>
            <h3 class="tag-title">Resume</h3>
            <div class="row">
                <div class="col-md-6 col-sm-12">
                    <h3 class="section-title">Resume</h3>
                    <div class="card-content container">
                        <a id="resume-download" href="Resume.pdf" target="_blank" rel="noopener" class="resume-btn btn btn-primary">Resume <i class="fas fa-download"></i></a>
                        <div data-render="resume-left"></div>
                    </div>
                </div>
                <div class="col-md-6 col-sm-12">
                    <div class="card-content container" data-render="resume-right"></div>
                </div>
            </div>
        </div> <!-- End resume card -->

        <!-- Contact card -->
        <div id="contact-card" class="center-card" role="button" tabindex="0" aria-label="Contact">
            <i class="icons fa fa-phone-alt"></i>
            <h3 class="tag-title">Contact</h3>
            <iframe id="contact-form" class="google-form" src="about:blank" width="100%" height="100%" style="border:0;" title="Contact form">Loading…</iframe>
        </div> <!-- End contact card -->
    </div> <!-- End Navigation cards -->

    <script src="js/script.js"></script>
</body>
</html>
